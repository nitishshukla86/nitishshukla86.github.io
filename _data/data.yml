career-profile:
    title: Profile
    summary: |
      Hi, I am currently a Data Scientist at Micron. Before that, I studied M.Sc. Computer Science at [Chennai Mathematical Institute](https://www.cmi.ac.in) and M.Sc. Mathematics at
      [IIT Guwahati](https://www.iitg.ac.in). At CMI, I worked with Prof [KV](https://www.cmi.ac.in/~kv/) and [Madhavan Mukund](https://www.cmi.ac.in/~madhavan/) studying the robustness properties
      in DNNs induced by prototypes. I am joining the University of Virginia under Prof [Madhav Marathe](https://engineering.virginia.edu/faculty/madhav-marathe) in Fall 23.

      My research interest mainly includes deep learning and explainability aspects of it. I am also interested in theoretical computer science, mainly graph theory.
      I am always looking to merge my application and theory interests and look at deep learning from interesting lenses.

      In my free time, I watch movies and play video games. I am also an avid hiker and a great admirer of snowy mountains. 

